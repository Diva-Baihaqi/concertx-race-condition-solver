<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ConcertX Simulator Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .glass-panel {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(26, 26, 26, 0.65);
        }
        .btn-primary {
            background: transparent;
            border: 1px solid #5FA04E;
            color: #5FA04E;
            transition: all 0.3s ease;
            position: relative;
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 15px rgba(95, 160, 78, 0.5);
            color: #83CD29;
            text-shadow: 0 0 8px rgba(131, 205, 41, 0.5);
            background: rgba(95, 160, 78, 0.1);
        }
        .btn-danger {
            background: transparent;
            border: 1px solid #E05252;
            color: #E05252;
            transition: all 0.3s ease;
            position: relative;
        }
        .btn-danger:hover:not(:disabled) {
            background: rgba(224, 82, 82, 0.1);
            box-shadow: 0 0 15px rgba(224, 82, 82, 0.5);
        }
        .btn-primary:disabled, .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .ambient-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(95,160,78,0.15) 0%, rgba(19,19,19,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        .ambient-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(131,205,41,0.1) 0%, rgba(19,19,19,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }
        
        /* Functional styles */
        .overbooked {
            color: #E05252 !important;
            text-shadow: 0 0 10px rgba(224, 82, 82, 0.5);
            animation: pulse 2s infinite;
        }
        .perfect {
            color: #83CD29 !important;
            text-shadow: 0 0 10px rgba(131, 205, 41, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
        }
        .hidden {
            display: none !important;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#131313",
                        "on-background": "#e5e2e1"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-caps": ["Space Grotesk"],
                        "body-base": ["Inter"],
                        "data-mono": ["Space Grotesk"],
                        "display-lg": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden">
<div class="ambient-glow-1"></div>
<div class="ambient-glow-2"></div>

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 h-16 bg-neutral-900/60 backdrop-blur-xl border-b border-white/10 shadow-none tracking-tight">
    <div class="flex items-center gap-8">
        <span class="text-2xl font-black text-[#5FA04E] drop-shadow-[0_0_8px_rgba(95,160,78,0.5)]">ConcertX Simulator</span>
    </div>
</header>

<!-- Main Content -->
<main class="pt-24 px-8 pb-12 w-full">
    <div class="max-w-5xl mx-auto">
        <header class="mb-12">
            <h1 class="font-display-lg text-4xl font-bold bg-gradient-to-r from-[#5FA04E] to-[#83CD29] bg-clip-text text-transparent mb-4">ConcertX Simulator</h1>
            <p class="font-headline-md text-xl text-neutral-400">Real-time Race Condition Visualization Engine</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Unsafe Card -->
            <div class="glass-panel rounded-xl overflow-hidden flex flex-col">
                <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
                    <h2 class="text-xl font-semibold">TAHAP 1</h2>
                    <span class="text-xs uppercase tracking-wider font-bold text-[#E05252] border border-[#E05252]/30 px-3 py-1 rounded-full bg-[#E05252]/10 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-[#E05252] animate-pulse"></span>
                        Unsafe (No Lock)
                    </span>
                </div>
                <div class="p-8 flex-1 flex flex-col gap-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/30 p-4 border border-white/5 rounded-lg text-center">
                            <p class="text-xs text-neutral-400 mb-1">Sisa Tiket</p>
                            <p id="s1-sisa" class="font-data-mono text-3xl font-bold text-white">-</p>
                        </div>
                        <div class="bg-black/30 p-4 border border-white/5 rounded-lg text-center">
                            <p class="text-xs text-neutral-400 mb-1">Terjual</p>
                            <p id="s1-terjual" class="font-data-mono text-3xl font-bold text-white">-</p>
                        </div>
                    </div>
                    <div class="bg-black/30 p-4 border border-white/5 rounded-lg flex justify-between items-center">
                        <p class="text-xs text-neutral-400">Waktu Eksekusi (ms)</p>
                        <p id="s1-waktu" class="font-data-mono text-xl font-bold text-[#E05252]">-</p>
                    </div>
                    <div class="mt-auto pt-6">
                        <button id="btn-s1" onclick="runStage1()" class="w-full py-4 rounded-lg btn-danger text-sm uppercase tracking-wider font-semibold">
                            <span class="btn-text">Jalankan Simulasi</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Safe Card -->
            <div class="glass-panel rounded-xl overflow-hidden flex flex-col">
                <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/20">
                    <h2 class="text-xl font-semibold">TAHAP 2</h2>
                    <span class="text-xs uppercase tracking-wider font-bold text-[#5FA04E] border border-[#5FA04E]/30 px-3 py-1 rounded-full bg-[#5FA04E]/10 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-[#5FA04E] animate-pulse"></span>
                        Safe (Distributed Lock)
                    </span>
                </div>
                <div class="p-8 flex-1 flex flex-col gap-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/30 p-4 border border-white/5 rounded-lg text-center">
                            <p class="text-xs text-neutral-400 mb-1">Sisa Tiket</p>
                            <p id="s2-sisa" class="font-data-mono text-3xl font-bold text-white">-</p>
                        </div>
                        <div class="bg-black/30 p-4 border border-white/5 rounded-lg text-center">
                            <p class="text-xs text-neutral-400 mb-1">Terjual</p>
                            <p id="s2-terjual" class="font-data-mono text-3xl font-bold text-white">-</p>
                        </div>
                    </div>
                    <div class="bg-black/30 p-4 border border-white/5 rounded-lg flex justify-between items-center">
                        <p class="text-xs text-neutral-400">Waktu Eksekusi (ms)</p>
                        <p id="s2-waktu" class="font-data-mono text-xl font-bold text-[#83CD29]">-</p>
                    </div>
                    <div class="mt-auto pt-6">
                        <button id="btn-s2" onclick="runStage2()" class="w-full py-4 rounded-lg btn-primary text-sm uppercase tracking-wider font-semibold">
                            <span class="btn-text">Jalankan Simulasi Terproteksi</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Section -->
        <div class="glass-panel rounded-xl overflow-hidden w-full mb-8">
            <div class="p-6 border-b border-white/10 bg-black/20">
                <h2 class="text-xl font-semibold">Analisis Performa</h2>
            </div>
            <div class="p-8 flex items-end gap-8 bg-black/10">
                <div class="w-full h-80 relative">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="script.js"></script>
</body>
</html>
